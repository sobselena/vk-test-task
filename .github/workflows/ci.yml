name: CI

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run --passWithNoTests

      - name: Typecheck
        run: npx tsc -b --pretty false

      - name: Build
        run: npm run build
